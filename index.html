<style>
:root{
  --void:#0b0a0f;--void-2:#13121a;--ink:#1a1922;--ink-2:#22212c;
  --line:#2a2934;--line-soft:#1f1e28;
  --cream:#e6e1d6;--cream-dim:#a8a395;--cream-muted:#6e6a5e;
  --brass:#9a7a3a;--amber:#cc7a1f;--ox:#7a1818;--ox-2:#5a1212;
  --green:#3a9a5a;--red:#c43838;--blue:#4a7aa8;--yellow:#c89a28;
  --serif:Georgia,'Libre Baskerville',ui-serif,serif;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--void);color:var(--cream);font:14px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:transparent;border:none;color:inherit}
input,textarea,select{font-family:inherit;background:var(--ink);border:1px solid var(--line);color:var(--cream);border-radius:3px;padding:7px 10px;outline:none;font-size:13px}
input:focus,textarea:focus,select:focus{border-color:var(--brass)}
input[type=number]{font-family:var(--mono)}
a{color:var(--brass)}a:hover{color:var(--amber)}
textarea{min-height:80px;resize:vertical;font-family:var(--mono);font-size:12px}

.app{min-height:100dvh;display:grid;grid-template-rows:48px 1fr}
header{display:flex;align-items:center;border-bottom:1px solid var(--line);background:var(--void-2);user-select:none}
.brand{display:flex;align-items:center;gap:10px;padding:0 16px;height:100%;border-right:1px solid var(--line)}
.brand .mark{width:28px;height:28px;background:linear-gradient(135deg,var(--ox),var(--ox-2));border-radius:5px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:16px;color:var(--cream)}
.brand .name{font-family:var(--serif);font-weight:600;font-size:14px;letter-spacing:0.02em}
.brand .seal{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.18em;text-transform:uppercase}

.pt-pill{display:flex;align-items:center;gap:8px;padding:0 14px;height:100%;border-right:1px solid var(--line);cursor:pointer;font-size:12px;color:var(--cream-dim)}
.pt-pill:hover{background:var(--ink);color:var(--cream)}
.pt-pill .who{font-family:var(--serif);font-size:13px;color:var(--brass)}
.pt-pill .meta{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase}

nav.tabs{display:flex;flex:1;overflow-x:auto;align-items:stretch}
nav.tabs button{padding:0 14px;font-size:12px;color:var(--cream-dim);letter-spacing:0.04em;display:flex;align-items:center;gap:6px;border-right:1px solid var(--line-soft);height:100%;white-space:nowrap;border-top:2px solid transparent}
nav.tabs button:hover{background:var(--ink);color:var(--cream)}
nav.tabs button.active{background:var(--ink);color:var(--brass);border-top-color:var(--ox)}

.tools-r{display:flex;align-items:center;gap:5px;padding:0 14px;height:100%;border-left:1px solid var(--line)}
.tool-btn{padding:5px 11px;border-radius:3px;font-size:11px;color:var(--cream-dim);letter-spacing:0.06em;text-transform:uppercase;font-family:var(--mono);border:1px solid var(--line)}
.tool-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--brass)}
.tool-btn.primary{background:var(--ox);color:var(--cream);border-color:var(--ox);font-weight:600}
.tool-btn.primary:hover{background:var(--ox-2);border-color:var(--ox-2)}

.layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100dvh - 48px)}
aside.sidebar{background:var(--void-2);border-right:1px solid var(--line);overflow-y:auto;padding:14px 12px 60px;display:flex;flex-direction:column;gap:10px}
.sidebar h4{font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px;padding:0 4px}
.sidebar-search{display:flex;flex-direction:column;gap:6px}
.sidebar-search input,.sidebar-search select{font-size:12px;padding:6px 8px}
.pt-list{display:flex;flex-direction:column;gap:3px}
.pt-card{padding:9px 11px;border-radius:3px;cursor:pointer;border:1px solid transparent;border-left:3px solid var(--line);background:var(--ink);transition:all 0.1s}
.pt-card:hover{background:var(--ink-2);border-left-color:var(--ox)}
.pt-card.active{background:var(--ink-2);border-left-color:var(--ox);border-color:var(--line)}
.pt-card .nm{font-family:var(--serif);font-size:13px;color:var(--cream);font-weight:600}
.pt-card .sub{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.06em;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
.pt-card .sub .tag{padding:1px 5px;border-radius:2px;background:var(--void);color:var(--cream-dim);font-size:9px}
.pt-card .sub .tag.due{background:var(--ox);color:var(--cream)}
.pt-card .sub .tag.vul{background:var(--yellow);color:var(--void)}
.pt-card .sub .tag.ep{color:var(--green);border:1px solid var(--green)}
.empty-state{padding:18px;text-align:center;color:var(--cream-muted);font-size:12px;font-style:italic}

main{padding:18px 22px 60px;overflow-y:auto;max-width:1240px;margin:0 auto;width:100%}

.disclaimer{background:rgba(122,24,24,0.20);border:1px solid var(--ox);border-left:3px solid var(--ox);border-radius:3px;padding:12px 16px;margin-bottom:18px;font-size:12px;color:var(--cream)}
.disclaimer strong{color:var(--brass)}

.section-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;gap:14px;flex-wrap:wrap}
.section-h h2{font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:0.01em}
.section-h .sub{font-family:var(--mono);font-size:11px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}
.section-h .actions{display:flex;gap:6px;flex-wrap:wrap}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.card{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:16px 18px}
.card h3{font-family:var(--serif);font-size:14px;font-weight:600;margin-bottom:10px;color:var(--cream);letter-spacing:0.01em}
.card h3 .meta{font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:0.1em;margin-left:8px}

.kpi{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px dashed var(--line-soft);font-size:13px}
.kpi:last-child{border-bottom:none}
.kpi .l{color:var(--cream-dim)}
.kpi .v{font-family:var(--mono);color:var(--cream);font-weight:500}
.kpi .v.green{color:var(--green)}.kpi .v.red{color:var(--red)}.kpi .v.amber{color:var(--amber)}.kpi .v.brass{color:var(--brass)}.kpi .v.blue{color:var(--blue)}

.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.row.r3{grid-template-columns:1fr 1fr 1fr}
.row.r4{grid-template-columns:1fr 1fr 1fr 1fr}
.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%}
.field .hint{font-size:10px;color:var(--cream-muted);margin-top:3px;font-family:var(--mono)}

.btn{padding:7px 14px;border:1px solid var(--brass);border-radius:3px;font-size:12px;color:var(--cream);background:transparent;letter-spacing:0.04em;cursor:pointer}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn.primary{background:var(--ox);color:var(--cream);border-color:var(--ox);font-weight:600}
.btn.primary:hover{background:var(--ox-2);border-color:var(--ox-2);color:var(--cream)}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:rgba(196,56,56,0.10)}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.ghost{border-color:var(--line);color:var(--cream-dim)}
.btn.ghost:hover{border-color:var(--brass);color:var(--brass)}

table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
th,td{padding:7px 10px;border-bottom:1px solid var(--line-soft);text-align:left;vertical-align:top}
th{color:var(--brass);font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;font-weight:600}
td.r{text-align:right;font-family:var(--mono)}
tr.total td{font-weight:600;border-top:1px solid var(--brass);border-bottom:none;padding-top:10px}
tr.clickable{cursor:pointer}
tr.clickable:hover{background:var(--ink)}

.tag{display:inline-block;padding:2px 7px;border-radius:11px;font-family:var(--mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--brass);color:var(--brass);margin-right:4px}
.tag.amber{border-color:var(--amber);color:var(--amber)}
.tag.green{border-color:var(--green);color:var(--green)}
.tag.red{border-color:var(--red);color:var(--red)}
.tag.blue{border-color:var(--blue);color:var(--blue)}
.tag.dim{border-color:var(--line);color:var(--cream-muted)}

.chat{display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;padding:6px}
.msg{padding:10px 14px;border-radius:6px;max-width:88%;font-size:13px;line-height:1.55;white-space:pre-wrap}
.msg.user{background:var(--ink);align-self:flex-end;border-bottom-right-radius:2px}
.msg.bot{background:var(--void-2);border:1px solid var(--line);border-left:2px solid var(--ox);align-self:flex-start;border-bottom-left-radius:2px}
.msg.bot .src{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.08em;margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)}
.chat-input{display:flex;gap:8px;margin-top:10px}
.chat-input input{flex:1;padding:11px 14px}

.subtabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:14px;overflow-x:auto}
.subtabs button{padding:8px 14px;font-size:12px;color:var(--cream-dim);letter-spacing:0.04em;white-space:nowrap;border-bottom:2px solid transparent}
.subtabs button:hover{color:var(--cream)}
.subtabs button.active{color:var(--brass);border-bottom-color:var(--ox)}

.note-entry{background:var(--ink);border-left:3px solid var(--ox);border-radius:3px;padding:10px 12px;margin-bottom:8px}
.note-entry .hd{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.06em;display:flex;justify-content:space-between;margin-bottom:6px}
.note-entry .hd .by{color:var(--brass)}
.note-entry .bd{font-size:13px;white-space:pre-wrap;font-family:var(--serif)}
.note-entry .hash{font-family:var(--mono);font-size:9px;color:var(--cream-muted);margin-top:6px;letter-spacing:0.04em;word-break:break-all}
.note-entry.correction{border-left-color:var(--amber)}

.cd-ledger{font-family:var(--mono);font-size:11px}
.cd-ledger .row-hd{display:grid;grid-template-columns:90px 80px 1fr 80px 80px 80px;gap:6px;padding:6px 0;border-bottom:1px solid var(--brass);color:var(--brass);font-size:10px;letter-spacing:0.06em;text-transform:uppercase}
.cd-ledger .row-it{display:grid;grid-template-columns:90px 80px 1fr 80px 80px 80px;gap:6px;padding:6px 0;border-bottom:1px dashed var(--line-soft);font-size:11px}
.cd-ledger .row-it .tx-received{color:var(--green)}
.cd-ledger .row-it .tx-dispensed{color:var(--amber)}
.cd-ledger .row-it .tx-destroyed{color:var(--red)}

.kloe-card{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:14px;margin-bottom:10px}
.kloe-card h4{font-family:var(--serif);font-size:14px;color:var(--brass);margin-bottom:6px}
.kloe-card .rating{display:inline-block;padding:2px 8px;border-radius:3px;font-family:var(--mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;margin-left:8px}
.rating.outstanding{background:var(--green);color:var(--void)}
.rating.good{background:var(--blue);color:var(--cream)}
.rating.requires-improvement{background:var(--amber);color:var(--void)}
.rating.inadequate{background:var(--red);color:var(--cream)}
.rating.not-rated{background:var(--ink);color:var(--cream-muted);border:1px solid var(--line)}

.timeline{position:relative;padding-left:20px;border-left:2px solid var(--line)}
.timeline .ev{position:relative;padding:8px 0 8px 14px;font-size:12px}
.timeline .ev::before{content:'';position:absolute;left:-22px;top:14px;width:8px;height:8px;border-radius:50%;background:var(--brass);border:2px solid var(--void)}
.timeline .ev .ts{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.06em}
.timeline .ev .act{color:var(--cream);font-weight:600}
.timeline .ev .rzn{color:var(--cream-dim);font-size:11px;margin-top:2px;font-style:italic}

.alert-flag{background:rgba(196,56,56,0.15);border:1px solid var(--red);border-left:3px solid var(--red);padding:8px 12px;border-radius:3px;margin-bottom:8px;font-size:12px;color:var(--cream)}
.alert-flag.amber{background:rgba(204,122,31,0.12);border-color:var(--amber);border-left-color:var(--amber)}

.palette-bg,.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:flex-start;justify-content:center;padding-top:14vh;z-index:900;backdrop-filter:blur(4px)}
.palette-bg.open,.modal-bg.open{display:flex}
.modal-bg{align-items:center;padding:18px}
.palette{background:var(--void-2);border:1px solid var(--ox);border-radius:5px;width:min(640px,90%);box-shadow:0 18px 50px rgba(0,0,0,0.7);overflow:hidden}
.palette-hd{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center}
.palette-hd .glyph{font-family:var(--serif);font-size:18px;color:var(--brass)}
.palette-hd input{flex:1;border:none;background:transparent;font-size:15px;padding:4px}
.palette-bd{max-height:50vh;overflow:auto;padding:8px}
.palette-row{padding:9px 12px;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px}
.palette-row:hover{background:var(--ink)}
.modal{background:var(--void-2);border:1px solid var(--ox);border-radius:4px;padding:22px;max-width:680px;width:100%;max-height:90vh;overflow:auto}
.modal h2{font-family:var(--serif);font-size:17px;margin-bottom:14px}
.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ox);color:var(--cream);padding:9px 18px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all 0.22s;z-index:1100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.onboard{max-width:580px;margin:5vh auto;padding:36px 32px;background:var(--void-2);border:1px solid var(--ox);border-radius:6px}
.onboard h1{font-family:var(--serif);font-size:28px;color:var(--brass);margin-bottom:6px}
.onboard .lead{color:var(--cream-dim);margin-bottom:20px;font-size:13px}
.onboard .step{font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:8px}

.drawer-toggle{display:none;padding:0 12px;height:100%;align-items:center;border-right:1px solid var(--line);cursor:pointer;color:var(--brass);font-size:18px}

@media (max-width:880px){
  .drawer-toggle{display:flex}
  .layout{grid-template-columns:1fr}
  aside.sidebar{position:fixed;top:48px;left:-320px;bottom:0;width:300px;z-index:50;transition:left 0.2s;box-shadow:0 0 30px rgba(0,0,0,0.6)}
  aside.sidebar.open{left:0}
  nav.tabs button{padding:0 10px;font-size:11px}
  main{padding:14px 14px 50px}
  .row,.row.r3,.row.r4{grid-template-columns:1fr}
  .brand .seal{display:none}
  .cd-ledger .row-hd,.cd-ledger .row-it{grid-template-columns:1fr 1fr;font-size:10px}
}
</style>

  function aiTier() { return STATE.config.ai_tier || 'T0'; }

  function renderAiChip() {
    const chip = $('#fk-ai-chip');
    if (!chip) return;
    const txt = $('#fk-ai-chip-text');
    chip.classList.remove('fk-chip-live', 'fk-chip-loading', 'fk-chip-warn');
    const tier = aiTier();
    if (tier === 'T0') { txt.textContent = 'T0 · off'; }
    else if (tier === 'T2') {
      if (STATE.ai.ready) { txt.textContent = 'T2 ' + (WEBLLM_MODELS[STATE.config.webllm_model || DEFAULT_MODEL]?.label.split(' · ')[0] || '') + ' · ready'; chip.classList.add('fk-chip-live'); }
      else if (STATE.ai.loading) { txt.textContent = 'T2 loading ' + Math.round(STATE.ai.progress) + '%'; chip.classList.add('fk-chip-loading'); }
      else { txt.textContent = 'T2 · click to load'; chip.classList.add('fk-chip-warn'); }
    } else if (tier === 'T3') {
      if (STATE.config.api_key) { txt.textContent = 'T3 ' + (T3_PROVIDERS[STATE.config.api_provider]?.label || 'BYOK') + ' · active'; chip.classList.add('fk-chip-live'); }
      else { txt.textContent = 'T3 · no key set'; chip.classList.add('fk-chip-warn'); }
    }
  }

  async function loadWebLLM(modelKey) {
    if (STATE.ai.loading) return;
    const key = modelKey || STATE.config.webllm_model || DEFAULT_MODEL;
    const model = WEBLLM_MODELS[key];
    if (!model) { console.error('fall-kit: unknown model', key); return; }
    if (STATE.ai.ready && STATE.ai.model === model.id) return;
    STATE.ai.loading = true; STATE.ai.progress = 0; renderAiChip();
    notify('Loading WebLLM · ' + model.label + ' · ' + model.size + ' first time', 'info');
    try {
      const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm@0.2.79');
      const engine = await CreateMLCEngine(model.id, {
        initProgressCallback: p => { STATE.ai.progress = (p.progress || 0) * 100; renderAiChip(); }
      });
      STATE.ai.engine = engine;
      STATE.ai.model = model.id;
      STATE.ai.ready = true;
      STATE.ai.loading = false;
      STATE.config.webllm_model = key; saveConfig();
      renderAiChip();
      notify('WebLLM ready · sovereign mode · ' + model.label.split(' · ')[0], 'ok');
    } catch (e) {
      console.error('fall-kit: WebLLM load failed', e);
      STATE.ai.loading = false; renderAiChip();
      notify('WebLLM load failed · ' + e.message, 'err');
    }
  }

  async function aiComplete(systemPrompt, userMsg, maxTokens) {
    maxTokens = maxTokens || 600;
    const tier = aiTier();
    if (tier === 'T2' && STATE.ai.ready && STATE.ai.engine) {
      const r = await STATE.ai.engine.chat.completions.create({
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }],
        max_tokens: maxTokens,
      });
      return r.choices[0].message.content;
    }
    if (tier === 'T3' && STATE.config.api_key && STATE.config.api_provider) {
      return await aiCloudCall(systemPrompt, userMsg, maxTokens);
    }
    return null;
  }

  async function aiCloudCall(sys, msg, maxTokens) {
    const provider = STATE.config.api_provider;
    const key = STATE.config.api_key;
    const model = STATE.config.api_model || T3_PROVIDERS[provider]?.default;
    if (provider === 'anthropic') {
      const r = await fetch(T3_PROVIDERS.anthropic.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: maxTokens, system: sys, messages: [{ role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + (await r.text()).slice(0, 200));
      const j = await r.json();
      return j.content[0].text;
    }
    if (provider === 'openai') {
      const r = await fetch(T3_PROVIDERS.openai.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'system', content: sys }, { role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('OpenAI ' + r.status);
      const j = await r.json();
      return j.choices[0].message.content;
    }
    if (provider === 'google') {
      const r = await fetch(T3_PROVIDERS.google.url + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: sys + '\n\n---\n\n' + msg }] }], generationConfig: { maxOutputTokens: maxTokens } }),
      });
      if (!r.ok) throw new Error('Google ' + r.status);
      const j = await r.json();
      return j.candidates[0].content.parts[0].text;
    }
    throw new Error('unknown provider: ' + provider);
  }

  // ─── WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN) ───
  const MESH_CHANNEL = 'fall-signal';
  const STUN_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
  function meshStart(opts) {
    if (STATE.mesh.active) return;
    opts = opts || {};
    const seedId = opts.seedId || (location.pathname + '#' + Math.random().toString(36).slice(2, 8));
    STATE.mesh.seedId = seedId;
    try { STATE.mesh.bc = new BroadcastChannel(MESH_CHANNEL); }
    catch (e) { console.warn('fall-kit: BroadcastChannel unavailable'); return; }
    STATE.mesh.bc.onmessage = e => {
      const m = e.data;
      if (!m || !m.kind || m.peerId === seedId) return;
      if (opts.onMessage) opts.onMessage(m);
    };
    STATE.mesh.bc.postMessage({ kind: 'fall-kit:hello', peerId: seedId, ts: Date.now(), seedName: opts.seedName || 'unknown' });
    STATE.mesh.active = true;
    notify('Mesh active · channel ' + MESH_CHANNEL, 'ok');
  }
  function meshPost(kind, payload) {
    if (!STATE.mesh.active || !STATE.mesh.bc) return false;
    STATE.mesh.bc.postMessage({ kind: kind, peerId: STATE.mesh.seedId, ts: Date.now(), payload: payload });
    return true;
  }

      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.background = kind === 'err' ? '#a14a2a' : kind === 'ok' ? '#6b8d4a' : '#c08a3a';
    t.style.color = kind === 'err' ? '#fff' : '#0a0a0a';
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(t._to);
    t._to = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(20px)'; }, 2400);
  }

})}

})}

async function handleMeshMessage(m){
  if(!m||m.source===TOOLNAME)return;
  try{
    if(m.type==='sync.request'){broadcast('sync.snapshot',{patients:state.patients,clinicians:state.clinicians,episodes:state.episodes,firm:state.firm});return}
    if(m.type==='sync.snapshot'){
      const p=m.payload||{};
      if(p.firm&&(!state.firm||(p.firm.updatedAt||0)>(state.firm.updatedAt||0))){state.firm=p.firm;await idbPut('firms',p.firm)}

      render();return;
    }
    if(m.type==='patient.created'||m.type==='patient.updated'){const pt=m.payload;if(!pt||!pt.id)return;const local=state.patients.find(x=>x.id===pt.id);if(!local||(pt.updatedAt||0)>(local.updatedAt||0)){await savePatient(pt,'mesh '+m.type+' from '+m.source,true);render()}}

  }catch(e){console.warn('mesh err',e)}
}

    consentToShare:{givenAt:null,recipients:[],scope:'',withdrawAt:null},
    marketingOptIn:false,
    vulnerabilityFlag:false,vulnerabilityNotes:'',safeguardingConcerns:[],capacityNotes:'',
    allergies:[],regularMedications:[],conditions:[],familyHistory:'',
    episodes:[],
    nextAppointmentAt:null,
    primaryClinicianId:clinicianId||(state.clinicians[0]&&state.clinicians[0].id)||''
  };
}
function newBlankEpisode(patientId,clinicianId){return{id:'ep_'+uid(),patientId,clinicianId:clinicianId||state.settings.currentClinicianId||'',openedAt:Date.now(),closedAt:null,presenting:'',diagnosis:'',plan:'',notes:[],prescriptionIds:[],procedures:[],documentsHeld:[],invoices:[]}}
function newBlankPrescription(patientId,episodeId,clinicianId){return{id:'rx_'+uid(),patientId,episodeId:episodeId||null,clinicianId:clinicianId||state.settings.currentClinicianId||'',ts:Date.now(),drug:'',formulation:'',dose:'',frequency:'',duration:'',quantity:'',batchNo:'',expiry:'',prescribedBy:'',dispensedBy:'',dispensedAt:null,notes:''}}
function newBlankCD(){return{id:'cd_'+uid(),firmId:(state.firm&&state.firm.id)||'',ts:Date.now(),drug:'',schedule:'2',strength:'',tx:'received',qty:0,unit:'mg',patientId:null,prescriptionRef:'',supplier:'',invoiceNo:'',batchNo:'',expiry:'',destructionMethod:'',destructionReason:'',clinicianId1:state.settings.currentClinicianId||'',clinicianId2:'',witnessNote:''}}
function newBlankSafeguarding(){return{id:'sg_'+uid(),firmId:(state.firm&&state.firm.id)||'',ts:Date.now(),patientId:state.activePatientId||null,type:'adult',concern:'',raisedBy:state.settings.currentClinicianId||'',referredTo:'',referralDate:null,outcome:'',status:'open',caldicottJustification:''}}

// Critical date flagging
function clinicianFlags(c){
  const f=[];if(!c)return f;
  const r=c.revalidationDue?daysFromNow(c.revalidationDue):null;
  if(r!==null&&r<0)f.push({sev:'red',msg:'Revalidation overdue'});else if(r!==null&&r<90)f.push({sev:'amber',msg:'Revalidation due in '+r+'d'});
  const a=c.appraisalLastAt?daysFromNow(c.appraisalLastAt+365*24*3600*1000):null;
  if(a!==null&&a<0)f.push({sev:'amber',msg:'Annual appraisal overdue'});
  const ix=c.indemnityExpiry?daysFromNow(c.indemnityExpiry):null;
  if(ix!==null&&ix<0)f.push({sev:'red',msg:'Indemnity expired'});else if(ix!==null&&ix<30)f.push({sev:'amber',msg:'Indemnity in '+ix+'d'});
  return f;
}
function firmFlags(f){const out=[];if(!f)return out;const ix=f.piExpiresAt?daysFromNow(f.piExpiresAt):null;if(ix!==null&&ix<0)out.push({sev:'red',msg:'Clinic PII expired'});else if(ix!==null&&ix<30)out.push({sev:'amber',msg:'Clinic PII in '+ix+'d'});return out}
function patientFlags(p){const f=[];if(!p)return f;if(p.vulnerabilityFlag)f.push({sev:'amber',msg:'Vulnerable patient flag'});const ap=p.nextAppointmentAt?daysFromNow(p.nextAppointmentAt):null;if(ap!==null&&ap<0)f.push({sev:'amber',msg:'Missed appointment'});const open=activePatientEpisodes(p).length;if(open>0)f.push({sev:'green',msg:open+' open episode'+(open>1?'s':'')});return f}

// Drug interaction check
function checkInteractions(patient,newRxName){
  const out=[];if(!patient||!newRxName)return out;
  const meds=(patient.regularMedications||[]).map(m=>typeof m==='string'?m:m.name).filter(Boolean);
  const existing=patientPrescriptions(patient).map(r=>r.drug).filter(Boolean);
  const all=[...meds,...existing].map(x=>x.toLowerCase());
  const n=newRxName.toLowerCase();
  for(const [a,b,sev,note] of INTERACTIONS){
    const al=a.toLowerCase(),bl=b.toLowerCase();
    if((n.includes(al)||al.includes(n))&&all.some(m=>m.includes(bl)||bl.includes(m)))out.push({a:newRxName,b,sev,note});
    else if((n.includes(bl)||bl.includes(n))&&all.some(m=>m.includes(al)||al.includes(m)))out.push({a:newRxName,b:a,sev,note});
  }
  return out;
}

// CD balance per drug
function cdBalance(drug){
  let bal=0;
  for(const e of state.cdRegister){if(e.drug!==drug)continue;const q=+e.qty||0;if(e.tx==='received')bal+=q;else bal-=q}
  return bal;
}
function cdUniqueDrugs(){return Array.from(new Set(state.cdRegister.map(e=>e.drug).filter(Boolean)))}
